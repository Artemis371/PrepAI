<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PrepAI — AI Interview Coach</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0f;--card:#13131a;--card2:#1a1a24;--border:#2a2a3a;--accent:#7c5cfc;--accent2:#c084fc;--green:#34d399;--yellow:#fbbf24;--red:#f87171;--text:#f0eeff;--muted:#8884a8}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
    h1,h2,h3{font-family:'Syne',sans-serif}
    #root{min-height:100vh}
    .app{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 16px 80px}
    .app::before{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:700px;height:500px;background:radial-gradient(ellipse,rgba(124,92,252,.15) 0%,transparent 70%);pointer-events:none;z-index:0}
    .app>*{position:relative;z-index:1}
    .header{width:100%;max-width:680px;display:flex;align-items:center;justify-content:space-between;padding:24px 0 16px}
    .logo{display:flex;align-items:center;gap:8px;font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem}
    .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
    .badge{font-size:11px;background:rgba(124,92,252,.2);border:1px solid rgba(124,92,252,.4);color:var(--accent2);padding:3px 10px;border-radius:100px;text-transform:uppercase;letter-spacing:.05em}
    .setup{width:100%;max-width:560px;margin-top:8px}
    .hero{text-align:center;margin-bottom:32px}
    .hero h1{font-size:clamp(1.8rem,5vw,2.8rem);font-weight:800;line-height:1.1;letter-spacing:-.04em;background:linear-gradient(135deg,var(--text) 30%,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}
    .hero p{color:var(--muted);font-size:.95rem;line-height:1.6;max-width:380px;margin:0 auto}
    .pills{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap}
    .pill{background:var(--card);border:1px solid var(--border);border-radius:100px;padding:6px 14px;font-size:12px;color:var(--muted)}
    .pill strong{color:var(--text)}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:12px}
    .clabel{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent2);margin-bottom:12px}
    .field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
    .field:last-child{margin-bottom:0}
    .field label{font-size:12px;color:var(--muted)}
    .field input,.field textarea{background:var(--card2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:9px 13px;outline:none;transition:border-color .2s;width:100%}
    .field input:focus,.field textarea:focus{border-color:var(--accent)}
    .field textarea{resize:vertical;min-height:80px;line-height:1.5}
    .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
    .chip{background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--muted);user-select:none;transition:all .15s}
    .chip:hover{border-color:var(--accent);color:var(--text)}
    .chip.on{background:rgba(124,92,252,.15);border-color:var(--accent);color:var(--accent2)}
    .btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:11px;color:#fff;font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;padding:14px;cursor:pointer;transition:opacity .2s,transform .15s;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:6px}
    .btn:hover{opacity:.9;transform:translateY(-1px)}
    .btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
    .iview{width:100%;max-width:680px}
    .pbar-wrap{background:var(--card2);border-radius:100px;height:3px;width:100%;margin-bottom:22px;overflow:hidden}
    .pbar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:100px;transition:width .5s ease}
    .imeta{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .qnum{font-family:'Syne',sans-serif;font-size:12px;color:var(--muted);font-weight:700}
    .qbadge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:3px 10px;border-radius:100px}
    .behavioral{background:rgba(251,191,36,.12);color:var(--yellow);border:1px solid rgba(251,191,36,.3)}
    .technical{background:rgba(124,92,252,.12);color:var(--accent2);border:1px solid rgba(124,92,252,.3)}
    .situational{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.3)}
    .qrow{display:flex;gap:13px;margin-bottom:16px}
    .av{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#5b21b6,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 0 0 3px rgba(124,92,252,.2)}
    .aname{font-size:11px;color:var(--muted);margin-bottom:5px}
    .qbub{background:var(--card2);border:1px solid var(--border);border-radius:0 14px 14px 14px;padding:15px 18px;font-size:1rem;line-height:1.6;color:var(--text)}
    .hint-btn{background:none;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 12px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px;margin-bottom:10px}
    .hint-btn:hover{border-color:var(--accent);color:var(--text)}
    .hint-btn.on{border-color:var(--accent);color:var(--accent2);background:rgba(124,92,252,.08)}
    .hint-box{border-radius:10px;padding:14px;margin-bottom:12px}
    .hint-title{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
    .hint-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .hstep{display:flex;gap:8px}
    .hletter{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:11px;flex-shrink:0}
    .htitle{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;margin-bottom:1px}
    .hdesc{font-size:11px;color:var(--muted);line-height:1.4}
    .tabs{display:flex;gap:5px;margin-bottom:10px}
    .tab{background:var(--card2);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 14px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
    .tab:hover{border-color:var(--accent);color:var(--text)}
    .tab.on{background:rgba(124,92,252,.15);border-color:var(--accent);color:var(--accent2)}
    .ans-area textarea{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;padding:14px;resize:none;outline:none;transition:border-color .2s;min-height:110px}
    .ans-area textarea:focus{border-color:var(--accent)}
    .ans-area textarea::placeholder{color:var(--muted)}
    .ans-foot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:10px}
    .chars{font-size:11px;color:var(--muted)}
    .sbtn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:9px;color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;padding:10px 24px;cursor:pointer;transition:opacity .2s,transform .15s;display:flex;align-items:center;gap:6px}
    .sbtn:hover{opacity:.9;transform:translateY(-1px)}
    .sbtn:disabled{opacity:.4;cursor:not-allowed;transform:none}
    .voice-area{display:flex;flex-direction:column;align-items:center;padding:20px 14px 6px;gap:12px}
    .mic{width:72px;height:72px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;transition:all .2s}
    .mic.off{background:var(--card2);border:2px solid var(--border)}
    .mic.off:hover{border-color:var(--accent);transform:scale(1.05)}
    .mic.on{background:rgba(248,113,113,.15);border:2px solid var(--red);animation:pring 1.5s ease-in-out infinite}
    .vstatus{font-size:13px;color:var(--muted);text-align:center;line-height:1.5}
    .vstatus strong{color:var(--text)}
    .vtxt{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.6;color:var(--text);min-height:60px}
    .vtxt.empty{color:var(--muted);font-style:italic}
    .vclear{width:100%;background:none;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;padding:8px;cursor:pointer;transition:all .2s}
    .vclear:hover{border-color:var(--red);color:var(--red)}
    .wave{display:flex;align-items:center;gap:3px;height:28px}
    .wb{width:4px;border-radius:2px;background:var(--red);animation:wv .8s ease-in-out infinite}
    .merr{color:var(--red);font-size:12px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:7px;padding:8px 12px;width:100%;text-align:center}
    .fbcard{background:var(--card2);border:1px solid var(--border);border-radius:11px;padding:18px;margin-top:16px}
    .fbhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .fbtitle{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
    .sc{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:800}
    .sc.g{background:rgba(52,211,153,.15);color:var(--green);border:2px solid var(--green)}
    .sc.y{background:rgba(251,191,36,.15);color:var(--yellow);border:2px solid var(--yellow)}
    .sc.r{background:rgba(248,113,113,.15);color:var(--red);border:2px solid var(--red)}
    .fbtext{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:10px}
    .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
    .tag{font-size:11px;padding:2px 9px;border-radius:100px;font-weight:500}
    .tg{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.3)}
    .tb{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.3)}
    .nbtn{width:100%;background:var(--card);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;padding:12px;cursor:pointer;transition:all .2s;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:6px}
    .nbtn:hover{background:var(--card2);border-color:var(--accent)}
    .results{width:100%;max-width:620px;text-align:center}
    .rring{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:8px auto 18px;position:relative}
    .rring::before{content:'';position:absolute;inset:11px;background:var(--bg);border-radius:50%}
    .rval{position:relative;z-index:1;font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .results h2{font-size:1.5rem;font-weight:800;letter-spacing:-.03em;margin-bottom:7px}
    .results>p{color:var(--muted);font-size:14px;margin-bottom:24px}
    .rgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:22px;text-align:left}
    .rstat{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:14px}
    .rstatv{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:var(--accent2);line-height:1;margin-bottom:3px}
    .rstatl{font-size:11px;color:var(--muted)}
    .breakdown{text-align:left;margin-bottom:16px}
    .bdt{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
    .bdi{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:14px;margin-bottom:8px}
    .bdq{font-size:12px;color:var(--muted);margin-bottom:4px}
    .bdrow{display:flex;align-items:center;gap:8px}
    .bdf{font-size:12px;color:var(--text);line-height:1.5;flex:1}
    .bds{font-family:'Syne',sans-serif;font-size:12px;font-weight:800;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .rbtn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:11px;color:#fff;font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;padding:14px;cursor:pointer;transition:opacity .2s;margin-top:4px}
    .rbtn:hover{opacity:.9}
    .spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle}
    /* Auth & Profile styles */
    .auth-wrap{width:100%;max-width:420px;margin-top:20px}
    .auth-hero{text-align:center;margin-bottom:28px}
    .auth-hero h1{font-size:clamp(1.6rem,4vw,2.2rem);font-weight:800;line-height:1.1;letter-spacing:-.04em;background:linear-gradient(135deg,var(--text) 30%,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
    .auth-hero p{color:var(--muted);font-size:.9rem}
    .auth-toggle{display:flex;gap:0;background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:3px;margin-bottom:16px}
    .auth-toggle button{flex:1;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;padding:7px;border-radius:7px;cursor:pointer;transition:all .15s}
    .auth-toggle button.on{background:var(--card);color:var(--text);font-weight:500}
    .auth-err{color:var(--red);font-size:12px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:7px;padding:8px 12px;margin-bottom:10px;text-align:center}
    .auth-sub{font-size:12px;color:var(--muted);text-align:center;margin-top:10px}
    .signout-btn{background:none;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;padding:5px 12px;cursor:pointer;transition:all .2s}
    .signout-btn:hover{border-color:var(--red);color:var(--red)}
    .user-pill{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
    .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px;color:var(--muted);font-size:14px}
    @keyframes sp{to{transform:rotate(360deg)}}
    @keyframes pring{0%{box-shadow:0 0 0 0 rgba(248,113,113,.4)}70%{box-shadow:0 0 0 14px rgba(248,113,113,0)}100%{box-shadow:0 0 0 0 rgba(248,113,113,0)}}
    @keyframes wv{0%,100%{height:5px}50%{height:22px}}
    @media(max-width:500px){.rgrid{grid-template-columns:1fr 1fr}.hint-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback}=React;

const SUPABASE_URL="https://dofluwvrpqlyunqxxstn.supabase.co";
const SUPABASE_KEY="sb_publishable_vOrCrCckXzeVVKSL0XFm4A_XFHAQd33";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const LEVELS=["Entry Level","Mid Level","Senior","Lead / Manager","Executive"];
const HINTS={
  behavioral:{label:"STAR Method",color:"#fbbf24",bg:"rgba(251,191,36,0.08)",border:"rgba(251,191,36,0.25)",steps:[{l:"S",t:"Situation",d:"Set the scene — when, where, what role."},{l:"T",t:"Task",d:"What was YOUR responsibility?"},{l:"A",t:"Action",d:"Exactly what YOU did, step by step."},{l:"R",t:"Result",d:"What happened? Quantify if possible."}]},
  technical:{label:"CAST Framework",color:"#c084fc",bg:"rgba(192,132,252,0.08)",border:"rgba(192,132,252,0.25)",steps:[{l:"C",t:"Clarify",d:"Confirm you understand the scope."},{l:"A",t:"Approach",d:"Outline your thinking first."},{l:"S",t:"Solution",d:"Answer confidently with examples."},{l:"T",t:"Trade-offs",d:"Mention pros/cons and alternatives."}]},
  situational:{label:"CARE Framework",color:"#34d399",bg:"rgba(52,211,153,0.08)",border:"rgba(52,211,153,0.25)",steps:[{l:"C",t:"Context",d:"Show you understand the stakes."},{l:"A",t:"Action Plan",d:"What you'd do first, second, third."},{l:"R",t:"Reasoning",d:"WHY you'd take that approach."},{l:"E",t:"Expected Outcome",d:"What success looks like."}]}
};
function scClass(s){return s>=8?"g":s>=5?"y":"r"}
function mss(s){
  if(s>=8)return{background:"rgba(52,211,153,.15)",color:"#34d399",border:"2px solid #34d399"};
  if(s>=5)return{background:"rgba(251,191,36,.15)",color:"#fbbf24",border:"2px solid #fbbf24"};
  return{background:"rgba(248,113,113,.15)",color:"#f87171",border:"2px solid #f87171"};
}

// ── Auth Screen ──────────────────────────────────────────────
function AuthScreen({onAuth}){
  const[mode,setMode]=useState("signup");
  const[email,setEmail]=useState("");
  const[password,setPassword]=useState("");
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");

  async function handle(){
    if(!email.trim()||!password.trim()){setErr("Fill in both fields.");return;}
    if(password.length<6){setErr("Password must be at least 6 characters.");return;}
    setLoading(true);setErr("");
    try{
      if(mode==="signup"){
        const{data,error}=await sb.auth.signUp({email,password});
        if(error)throw error;
        onAuth(data.user,true);
      }else{
        const{data,error}=await sb.auth.signInWithPassword({email,password});
        if(error)throw error;
        onAuth(data.user,false);
      }
    }catch(e){setErr(e.message||"Something went wrong.");}
    finally{setLoading(false);}
  }

  return(
    <div className="auth-wrap">
      <div className="auth-hero">
        <h1>Ace Your Next Interview</h1>
        <p>AI mock interviews with instant feedback.</p>
      </div>
      <div className="card">
        <div className="auth-toggle">
          <button className={mode==="signup"?"on":""} onClick={()=>{setMode("signup");setErr("");}}>Sign Up</button>
          <button className={mode==="login"?"on":""} onClick={()=>{setMode("login");setErr("");}}>Log In</button>
        </div>
        {err&&<div className="auth-err">{err}</div>}
        <div className="field">
          <label>Email</label>
          <input type="email" placeholder="you@email.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle()}/>
        </div>
        <div className="field">
          <label>Password</label>
          <input type="password" placeholder="Min 6 characters" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle()}/>
        </div>
        <button className="btn" onClick={handle} disabled={loading} style={{marginTop:4}}>
          {loading?<><span className="spin"></span> {mode==="signup"?"Creating account...":"Signing in..."}</>:mode==="signup"?"Create Account →":"Sign In →"}
        </button>
        <div className="auth-sub">{mode==="signup"?"Already have an account? ":"Don't have an account? "}
          <span style={{color:"var(--accent2)",cursor:"pointer"}} onClick={()=>{setMode(mode==="signup"?"login":"signup");setErr("");}}>
            {mode==="signup"?"Log in":"Sign up"}
          </span>
        </div>
      </div>
    </div>
  );
}

// ── Profile Setup Screen ─────────────────────────────────────
function ProfileSetup({user,onSave}){
  const[name,setName]=useState("");
  const[role,setRole]=useState("");
  const[level,setLevel]=useState("Mid Level");
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");

  async function save(){
    if(!name.trim()||!role.trim()){setErr("Fill in your name and target role.");return;}
    setLoading(true);setErr("");
    try{
      const{error}=await sb.from("profiles").upsert({
        email:user.email,
        name:name.trim(),
        target_role:role.trim(),
        experience_level:level,
        interviews_completed:0
      },{onConflict:"email"});
      if(error)throw error;
      onSave({email:user.email,name:name.trim(),target_role:role.trim(),experience_level:level,interviews_completed:0});
    }catch(e){setErr(e.message||"Failed to save profile.");}
    finally{setLoading(false);}
  }

  return(
    <div className="auth-wrap" style={{maxWidth:520}}>
      <div className="auth-hero">
        <h1>Set Up Your Profile</h1>
        <p>This gets saved so you never have to fill it in again.</p>
      </div>
      <div className="card">
        <div className="clabel">👤 About You</div>
        {err&&<div className="auth-err">{err}</div>}
        <div className="field">
          <label>Your Name</label>
          <input placeholder="e.g. Jordan" value={name} onChange={e=>setName(e.target.value)}/>
        </div>
        <div className="field">
          <label>Target Job Title</label>
          <input placeholder="e.g. Software Engineer, Product Manager..." value={role} onChange={e=>setRole(e.target.value)}/>
        </div>
        <div className="field">
          <label>Experience Level</label>
          <div className="chips">{LEVELS.map(l=><div key={l} className={"chip"+(level===l?" on":"")} onClick={()=>setLevel(l)}>{l}</div>)}</div>
        </div>
        <button className="btn" onClick={save} disabled={loading} style={{marginTop:4}}>
          {loading?<><span className="spin"></span> Saving...</>:"Save & Continue →"}
        </button>
      </div>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────
function App(){
  const[appState,setAppState]=useState("loading"); // loading | auth | profile-setup | app
  const[user,setUser]=useState(null);
  const[profile,setProfile]=useState(null);

  const[screen,setScreen]=useState("setup");
  const[role,setRole]=useState("");
  const[level,setLevel]=useState("Mid Level");
  const[jd,setJd]=useState("");
  const[qcount,setQcount]=useState(5);
  const[questions,setQuestions]=useState([]);
  const[qi,setQi]=useState(0);
  const[answer,setAnswer]=useState("");
  const[feedbacks,setFeedbacks]=useState([]);
  const[loading,setLoading]=useState(false);
  const[submitting,setSubmitting]=useState(false);
  const[showFb,setShowFb]=useState(false);
  const[showHint,setShowHint]=useState(false);
  const[mode,setMode]=useState("text");
  const[recording,setRecording]=useState(false);
  const[vtxt,setVtxt]=useState("");
  const[merr,setMerr]=useState("");
  const taRef=useRef(null);
  const recRef=useRef(null);
  const ftRef=useRef("");

  // Check session on load
  useEffect(()=>{
    sb.auth.getSession().then(async({data:{session}})=>{
      if(!session){setAppState("auth");return;}
      setUser(session.user);
      await loadProfile(session.user);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange(async(_event,session)=>{
      if(!session){setUser(null);setProfile(null);setAppState("auth");}
    });
    return()=>subscription.unsubscribe();
  },[]);

  async function loadProfile(u){
    const{data,error}=await sb.from("profiles").select("*").eq("email",u.email).single();
    if(error||!data){setAppState("profile-setup");}
    else{
      setProfile(data);
      setRole(data.target_role||"");
      setLevel(data.experience_level||"Mid Level");
      setAppState("app");
    }
  }

  function handleAuth(u,isNew){
    setUser(u);
    if(isNew){setAppState("profile-setup");}
    else{loadProfile(u);}
  }

  function handleProfileSave(p){
    setProfile(p);
    setRole(p.target_role||"");
    setLevel(p.experience_level||"Mid Level");
    setAppState("app");
  }

  async function signOut(){
    await sb.auth.signOut();
    setUser(null);setProfile(null);setAppState("auth");
    setScreen("setup");setRole("");setLevel("Mid Level");
  }

  async function incrementInterviews(){
    if(!profile)return;
    const newCount=(profile.interviews_completed||0)+1;
    await sb.from("profiles").update({interviews_completed:newCount}).eq("email",profile.email);
    setProfile(p=>({...p,interviews_completed:newCount}));
  }

  const prog=questions.length?((qi+(showFb?1:0))/questions.length)*100:0;
  const total=feedbacks.length?Math.round(feedbacks.reduce((s,f)=>s+(f.score||5),0)/feedbacks.length):0;
  const eff=mode==="voice"?vtxt:answer;

  async function ai(messages,sys){
    const r=await fetch("/.netlify/functions/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages})});
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    return d.content?.[0]?.text||"";
  }

  const startVoice=useCallback(()=>{
    setMerr("");
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setMerr("Voice not supported — use Chrome or Edge.");return;}
    const r=new SR();r.continuous=true;r.interimResults=true;r.lang="en-US";
    ftRef.current=vtxt;
    r.onresult=e=>{
      let int="",fin=ftRef.current;
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal){fin+=e.results[i][0].transcript+" ";ftRef.current=fin;}
        else int+=e.results[i][0].transcript;
      }
      setVtxt(fin+int);
    };
    r.onerror=e=>{
      if(e.error==="not-allowed")setMerr("Mic blocked — allow microphone access in your browser.");
      else if(e.error!=="aborted")setMerr("Voice error: "+e.error);
      setRecording(false);
    };
    r.onend=()=>setRecording(false);
    recRef.current=r;r.start();setRecording(true);
  },[vtxt]);

  const stopVoice=useCallback(()=>{recRef.current?.stop();setRecording(false);},[]);

  async function start(){
    if(!role.trim())return;
    setLoading(true);
    try{
      const raw=await ai([{role:"user",content:`Generate exactly ${qcount} interview questions for a ${level} ${role}.${jd?` Job context: ${jd.slice(0,400)}`:""}\nReturn ONLY JSON: {"questions":[{"text":"...","type":"behavioral|technical|situational"}]}\nMix: 40% behavioral, 35% technical, 25% situational.`}],"Expert interviewer. Return ONLY valid JSON, no markdown.");
      const p=JSON.parse(raw.replace(/```json|```/g,"").trim());
      setQuestions(p.questions);setQi(0);setFeedbacks([]);setAnswer("");setVtxt("");
      setShowFb(false);setShowHint(false);ftRef.current="";
      setScreen("interview");
      await incrementInterviews();
    }catch(e){alert("Error: "+e.message);}
    finally{setLoading(false);}
  }

  async function submit(){
    if(!eff.trim()||submitting)return;
    setSubmitting(true);
    try{
      const q=questions[qi];
      const raw=await ai([{role:"user",content:`Role: ${level} ${role}\nQuestion (${q.type}): ${q.text}\nAnswer: ${eff}\nReturn ONLY: {"score":<1-10>,"summary":"<2-3 sentences>","strengths":["..."],"improvements":["..."]}`}],"Senior hiring manager. Candid feedback. Return ONLY valid JSON.");
      const fb=JSON.parse(raw.replace(/```json|```/g,"").trim());
      setFeedbacks(p=>[...p,{...fb,question:q.text}]);
      setShowFb(true);
    }catch(e){alert("Error: "+e.message);}
    finally{setSubmitting(false);}
  }

  function next(){
    if(qi+1>=questions.length){setScreen("results");return;}
    setQi(c=>c+1);setAnswer("");setVtxt("");setShowFb(false);setShowHint(false);ftRef.current="";setMerr("");
  }

  function restart(){
    setScreen("setup");setRole(profile?.target_role||"");setLevel(profile?.experience_level||"Mid Level");setJd("");setQcount(5);
    setQuestions([]);setFeedbacks([]);setAnswer("");setVtxt("");setQi(0);
    setShowFb(false);setShowHint(false);ftRef.current="";setMerr("");
  }

  useEffect(()=>{
    if(taRef.current){taRef.current.style.height="auto";taRef.current.style.height=taRef.current.scrollHeight+"px";}
  },[answer]);

  const q=questions[qi];
  const fb=feedbacks[feedbacks.length-1];
  const hint=q?(HINTS[q.type]||HINTS.behavioral):null;

  if(appState==="loading") return(
    <div className="app">
      <header className="header">
        <div className="logo"><div className="logo-icon">🎯</div>PrepAI</div>
        <span className="badge">AI-Powered</span>
      </header>
      <div className="loading-screen"><span className="spin" style={{width:28,height:28,borderWidth:3}}></span>Loading...</div>
    </div>
  );

  if(appState==="auth") return(
    <div className="app">
      <header className="header">
        <div className="logo"><div className="logo-icon">🎯</div>PrepAI</div>
        <span className="badge">AI-Powered</span>
      </header>
      <AuthScreen onAuth={handleAuth}/>
    </div>
  );

  if(appState==="profile-setup") return(
    <div className="app">
      <header className="header">
        <div className="logo"><div className="logo-icon">🎯</div>PrepAI</div>
        <span className="badge">AI-Powered</span>
      </header>
      <ProfileSetup user={user} onSave={handleProfileSave}/>
    </div>
  );

  return(
    <div className="app">
      <header className="header">
        <div className="logo"><div className="logo-icon">🎯</div>PrepAI</div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {profile&&<div className="user-pill">👤 {profile.name} · {profile.interviews_completed} interview{profile.interviews_completed!==1?"s":""}</div>}
          <button className="signout-btn" onClick={signOut}>Sign out</button>
        </div>
      </header>

      {screen==="setup"&&(
        <div className="setup">
          <div className="hero">
            <h1>Ready to practice{profile?.name?`, ${profile.name.split(" ")[0]}`:""}?</h1>
            <p>AI mock interviews with instant feedback. Type or speak your answers.</p>
            <div className="pills">
              <span className="pill">🎙️ <strong>Voice</strong> mode</span>
              <span className="pill">💡 <strong>STAR</strong> hints</span>
              <span className="pill">📊 <strong>Instant</strong> scoring</span>
            </div>
          </div>
          <div className="card">
            <div className="clabel">⚙️ Your Role</div>
            <div className="field">
              <label>Job Title</label>
              <input placeholder="e.g. Software Engineer, Product Manager..." value={role} onChange={e=>setRole(e.target.value)}/>
            </div>
            <div className="field">
              <label>Experience Level</label>
              <div className="chips">{LEVELS.map(l=><div key={l} className={"chip"+(level===l?" on":"")} onClick={()=>setLevel(l)}>{l}</div>)}</div>
            </div>
          </div>
          <div className="card">
            <div className="clabel">📋 Job Description <span style={{fontWeight:400,textTransform:"none",letterSpacing:0,fontSize:10,color:"var(--muted)"}}>(optional)</span></div>
            <div className="field">
              <textarea placeholder="Paste job description for targeted questions..." value={jd} onChange={e=>setJd(e.target.value)}/>
            </div>
          </div>
          <div className="card">
            <div className="clabel">🎲 Length</div>
            <div className="chips">{[3,5,7,10].map(n=><div key={n} className={"chip"+(qcount===n?" on":"")} onClick={()=>setQcount(n)}>{n} questions · ~{n*3} min</div>)}</div>
          </div>
          <button className="btn" onClick={start} disabled={!role.trim()||loading}>
            {loading?<><span className="spin"></span> Generating questions...</>:"▶  Start Interview"}
          </button>
        </div>
      )}

      {screen==="interview"&&q&&(
        <div className="iview">
          <div className="pbar-wrap"><div className="pbar" style={{width:`${prog}%`}}/></div>
          <div className="imeta">
            <span className="qnum">Question {qi+1} of {questions.length}</span>
            <span className={`qbadge ${q.type}`}>{q.type}</span>
          </div>
          <div className="card" style={{padding:"20px 22px"}}>
            <div className="qrow">
              <div className="av">👩‍💼</div>
              <div style={{flex:1}}>
                <div className="aname">Alex — Senior Hiring Manager</div>
                <div className="qbub">{q.text}</div>
              </div>
            </div>
            {!showFb&&(<>
              <button className={"hint-btn"+(showHint?" on":"")} onClick={()=>setShowHint(h=>!h)}>
                💡 {showHint?"Hide":"Show"} {hint?.label} tips
              </button>
              {showHint&&hint&&(
                <div className="hint-box" style={{background:hint.bg,border:`1px solid ${hint.border}`}}>
                  <div className="hint-title" style={{color:hint.color}}>{hint.label}</div>
                  <div className="hint-grid">
                    {hint.steps.map(s=>(
                      <div key={s.l} className="hstep">
                        <div className="hletter" style={{background:hint.bg,color:hint.color,border:`1px solid ${hint.border}`}}>{s.l}</div>
                        <div><div className="htitle" style={{color:hint.color}}>{s.t}</div><div className="hdesc">{s.d}</div></div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              <div className="tabs">
                <div className={"tab"+(mode==="text"?" on":"")} onClick={()=>{setMode("text");if(recording)stopVoice();}}>⌨️ Type</div>
                <div className={"tab"+(mode==="voice"?" on":"")} onClick={()=>{setMode("voice");setMerr("");}}>🎙️ Speak</div>
              </div>
              {mode==="text"&&(
                <div className="ans-area">
                  <textarea ref={taRef} placeholder="Type your answer here..." value={answer} onChange={e=>setAnswer(e.target.value)} disabled={submitting}/>
                  <div className="ans-foot">
                    <span className="chars">{answer.length} chars</span>
                    <button className="sbtn" onClick={submit} disabled={!answer.trim()||submitting}>
                      {submitting?<><span className="spin"></span> Analyzing...</>:"Submit →"}
                    </button>
                  </div>
                </div>
              )}
              {mode==="voice"&&(
                <div className="ans-area">
                  <div className="voice-area">
                    {merr&&<div className="merr">{merr}</div>}
                    <button className={`mic ${recording?"on":"off"}`} onClick={()=>recording?stopVoice():startVoice()}>
                      {recording?"⏹":"🎙️"}
                    </button>
                    {recording&&<div className="wave">{[0,1,2,3,4].map(i=><div key={i} className="wb" style={{animationDelay:`${i*.12}s`}}/>)}</div>}
                    <div className="vstatus">
                      {recording?<><strong>Recording...</strong><br/>Press ⏹ when done</>
                        :vtxt?<><strong>✓ Got it!</strong> Review or re-record.</>
                        :<>Press 🎙️ to <strong>speak your answer</strong><br/><span style={{fontSize:11}}>Best in Chrome / Edge</span></>}
                    </div>
                    {(vtxt||recording)&&<div className={`vtxt${!vtxt?" empty":""}`}>{vtxt||"Listening..."}</div>}
                    {vtxt&&!recording&&<button className="vclear" onClick={()=>{setVtxt("");ftRef.current="";}}>🗑 Clear & re-record</button>}
                  </div>
                  <div className="ans-foot">
                    <span className="chars">{vtxt.length} chars</span>
                    <button className="sbtn" onClick={submit} disabled={!vtxt.trim()||submitting||recording}>
                      {submitting?<><span className="spin"></span> Analyzing...</>:"Submit →"}
                    </button>
                  </div>
                </div>
              )}
            </>)}
            {showFb&&fb&&(
              <div className="fbcard">
                <div className="fbhead">
                  <div className="fbtitle">AI Feedback</div>
                  <div className={`sc ${scClass(fb.score)}`}>{fb.score}/10</div>
                </div>
                <div className="fbtext">{fb.summary}</div>
                <div className="tags">
                  {(fb.strengths||[]).map((s,i)=><span key={i} className="tag tg">✓ {s}</span>)}
                  {(fb.improvements||[]).map((s,i)=><span key={i} className="tag tb">↑ {s}</span>)}
                </div>
                <button className="nbtn" onClick={next}>{qi+1>=questions.length?"📊 See Results →":"Next Question →"}</button>
              </div>
            )}
          </div>
        </div>
      )}

      {screen==="results"&&(
        <div className="results">
          <div className="rring" style={{background:`conic-gradient(#7c5cfc 0%,#c084fc ${total*10}%,#1a1a24 ${total*10}%)`}}>
            <div className="rval">{total}/10</div>
          </div>
          <h2>{total>=8?"Outstanding! 🏆":total>=6?"Solid Interview! 👏":"Keep Practicing! 💪"}</h2>
          <p>{total>=8?"You're ready. Strong candidate!":total>=6?"Good foundation — polish it up.":"Use this feedback to level up."}</p>
          <div className="rgrid">
            <div className="rstat"><div className="rstatv">{feedbacks.length}</div><div className="rstatl">Answered</div></div>
            <div className="rstat"><div className="rstatv">{feedbacks.filter(f=>f.score>=8).length}</div><div className="rstatl">Strong</div></div>
            <div className="rstat"><div className="rstatv">{feedbacks.filter(f=>f.score<6).length}</div><div className="rstatl">Need work</div></div>
          </div>
          <div className="breakdown">
            <div className="bdt">Breakdown</div>
            {feedbacks.map((f,i)=>(
              <div key={i} className="bdi">
                <div className="bdq">Q{i+1}: {f.question}</div>
                <div className="bdrow">
                  <div className="bdf">{f.summary}</div>
                  <div className="bds" style={mss(f.score)}>{f.score}</div>
                </div>
              </div>
            ))}
          </div>
          <button className="rbtn" onClick={restart}>🔄 Start New Interview</button>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
